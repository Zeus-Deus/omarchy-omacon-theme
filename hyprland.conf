general {
    col.active_border = rgba(00000000)
    col.inactive_border = rgba(00000000)
    border_size = 0
    gaps_in = 4
    gaps_out = 8
    resize_on_border = true
}

group {
    col.border_active = rgba(00000000)
    col.border_inactive = rgba(00000000)
}

decoration {
    rounding = 6
    active_opacity = 0.95
    inactive_opacity = 0.85

    shadow {
        enabled = true
        range = 42
        render_power = 3
        color = 0x88ff66ff
        color_inactive = 0x26ff66ff
    }
    
    blur {
        enabled = true
        size = 8
        passes = 3
        noise = 0.03
        contrast = 1.07
        brightness = 0.83
        vibrancy = 0.23
        vibrancy_darkness = 0.75
    }

}

